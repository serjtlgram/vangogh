  <!-- ── Загрузочный экран ── -->

      <g fill="#c9a84c" fill-opacity="0.72">
        <!-- main L-bracket lines -->
        <rect x="4" y="4" width="1.4" height="52" rx="0.7"/>
        <rect x="4" y="4" width="52" height="1.4" rx="0.7"/>
        <!-- inner bracket -->
        <rect x="9" y="9" width="0.8" height="36" rx="0.4" fill-opacity="0.4"/>
        <rect x="9" y="9" width="36" height="0.8" rx="0.4" fill-opacity="0.4"/>
        <!-- corner diamond -->
        <path d="M4 4 L8 7 L4 10 L0 7 Z" fill-opacity="0.9"/>
        <!-- end caps -->
        <circle cx="4" cy="56" r="2.2" fill-opacity="0.65"/>
        <circle cx="56" cy="4" r="2.2" fill-opacity="0.65"/>
        <!-- flourish swirl body -->
        <path d="M18 18
          C 18 14, 22 10, 28 11
          C 34 12, 36 18, 32 22
          C 28 26, 22 24, 20 28
          C 18 32, 22 38, 28 36
          C 34 34, 34 28, 30 26"
          stroke="#c9a84c" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-opacity="0.85"/>
        <!-- small leaf top -->
        <path d="M28 11 C 30 7, 36 7, 36 11 C 36 15, 30 15, 28 11 Z" fill-opacity="0.55"/>
        <!-- tendril from swirl going right -->
        <path d="M30 26 C 36 24, 44 26, 46 22 C 48 18, 44 14, 40 15 C 36 16, 35 20, 38 21"
          stroke="#c9a84c" stroke-width="1" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
        <!-- small berry on tendril -->
        <circle cx="40" cy="14.5" r="2" fill-opacity="0.6"/>
        <!-- tendril from swirl going down -->
        <path d="M20 28 C 16 34, 18 42, 22 44 C 26 46, 30 42, 28 38 C 26 34, 22 35, 22 38"
          stroke="#c9a84c" stroke-width="1" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
        <!-- small berry -->
        <circle cx="22" cy="44.5" r="2" fill-opacity="0.6"/>
        <!-- decorative small dots -->
        <circle cx="14" cy="14" r="1" fill-opacity="0.4"/>
        <circle cx="50" cy="9" r="1" fill-opacity="0.35"/>
        <circle cx="9" cy="50" r="1" fill-opacity="0.35"/>
      </g>
    </svg>
    <!-- TR: horizontal mirror -->
    <svg class="loader-corner loader-corner--tr" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g fill="#c9a84c" fill-opacity="0.72" transform="scale(-1,1) translate(-120,0)">

        <rect x="4" y="4" width="52" height="1.4" rx="0.7"/>
        <rect x="9" y="9" width="0.8" height="36" rx="0.4" fill-opacity="0.4"/>

        <circle cx="56" cy="4" r="2.2" fill-opacity="0.65"/>
        <path d="M18 18 C 18 14, 22 10, 28 11 C 34 12, 36 18, 32 22 C 28 26, 22 24, 20 28 C 18 32, 22 38, 28 36 C 34 34, 34 28, 30 26"
          stroke="#c9a84c" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-opacity="0.85"/>
        <path d="M28 11 C 30 7, 36 7, 36 11 C 36 15, 30 15, 28 11 Z" fill-opacity="0.55"/>
        <path d="M30 26 C 36 24, 44 26, 46 22 C 48 18, 44 14, 40 15 C 36 16, 35 20, 38 21"
          stroke="#c9a84c" stroke-width="1" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
        <circle cx="40" cy="14.5" r="2" fill-opacity="0.6"/>
        <path d="M20 28 C 16 34, 18 42, 22 44 C 26 46, 30 42, 28 38 C 26 34, 22 35, 22 38"
          stroke="#c9a84c" stroke-width="1" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
        <circle cx="22" cy="44.5" r="2" fill-opacity="0.6"/>
        <circle cx="14" cy="14" r="1" fill-opacity="0.4"/>
        <circle cx="50" cy="9" r="1" fill-opacity="0.35"/>
        <circle cx="9" cy="50" r="1" fill-opacity="0.35"/>

        <circle cx="56" cy="4" r="2.2" fill-opacity="0.65"/>
        <path d="M18 18 C 18 14, 22 10, 28 11 C 34 12, 36 18, 32 22 C 28 26, 22 24, 20 28 C 18 32, 22 38, 28 36 C 34 34, 34 28, 30 26"
          stroke="#c9a84c" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-opacity="0.85"/>
        <path d="M28 11 C 30 7, 36 7, 36 11 C 36 15, 30 15, 28 11 Z" fill-opacity="0.55"/>
        <path d="M30 26 C 36 24, 44 26, 46 22 C 48 18, 44 14, 40 15 C 36 16, 35 20, 38 21"
          stroke="#c9a84c" stroke-width="1" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
        <circle cx="40" cy="14.5" r="2" fill-opacity="0.6"/>
        <path d="M20 28 C 16 34, 18 42, 22 44 C 26 46, 30 42, 28 38 C 26 34, 22 35, 22 38"

        <circle cx="50" cy="9" r="1" fill-opacity="0.35"/>

        <path d="M18 18 C 18 14, 22 10, 28 11 C 34 12, 36 18, 32 22 C 28 26, 22 24, 20 28 C 18 32, 22 38, 28 36 C 34 34, 34 28, 30 26"

        <path d="M28 11 C 30 7, 36 7, 36 11 C 36 15, 30 15, 28 11 Z" fill-opacity="0.55"/>
        <path d="M30 26 C 36 24, 44 26, 46 22 C 48 18, 44 14, 40 15 C 36 16, 35 20, 38 21"

        <circle cx="40" cy="14.5" r="2" fill-opacity="0.6"/>
        <path d="M20 28 C 16 34, 18 42, 22 44 C 26 46, 30 42, 28 38 C 26 34, 22 35, 22 38"
          stroke="#c9a84c" stroke-width="1" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
        <circle cx="22" cy="44.5" r="2" fill-opacity="0.6"/>
        <circle cx="14" cy="14" r="1" fill-opacity="0.4"/>
        <circle cx="50" cy="9" r="1" fill-opacity="0.35"/>
        <circle cx="9" cy="50" r="1" fill-opacity="0.35"/>
      </g>
    </svg>

    <div class="loader-content">
      <p class="loader-title">Van Gogh</p>
      <p class="loader-sub">Preparing experience</p>
      <div class="loader-bar-wrap">
        <div id="loader-bar-fill"></div>
      </div>

  </div>

  <!-- ── High-Res Image Overlay ── -->

  <!-- ── Potato Eaters: SVG Interactive Overlay ── -->
  <svg id="potato-overlay" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <filter id="pg-soft" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="pg-bright" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
        <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
        <feComposite in="b" in2="SourceGraphic" operator="over" result="glow"/>
        <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="pg-frame-hover" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- Connection lines (static, shown when toggle on) -->
    <g id="potato-lines"></g>
    <!-- Zone frames (shown when toggle on) -->
    <g id="potato-frames"></g>
    <!-- Light sweeper animations -->
    <g id="potato-sweepers"></g>
  </svg>
