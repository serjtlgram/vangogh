<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.6" flood-color="#000000"/>
    </filter>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="50%" stop-color="#9E9E9E"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  
  <g filter="url(#shadow)">
    <!-- Handle -->
    <path d="M 11 15 L 15 11 L 29 25 C 31 27, 27 31, 25 29 Z" fill="url(#wood)" />
    
    <!-- Ferrule (Metal part) -->
    <path d="M 8 12 L 12 8 L 15 11 L 11 15 Z" fill="url(#metal)" />
    <line x1="9.5" y1="12.5" x2="12.5" y2="9.5" stroke="#757575" stroke-width="0.5"/>
    <line x1="10.5" y1="13.5" x2="13.5" y2="10.5" stroke="#757575" stroke-width="0.5"/>
    
    <!-- Bristles -->
    <path d="M 2 2 Q 4 9 8 12 L 12 8 Q 9 4 2 2 Z" fill="url(#hair)" />
    
    <!-- Paint on tip -->
    <!-- Bright Red paint for pointer/hover -->
    <path d="M 2 2 Q 3 6 5.5 7.5 L 7.5 5.5 Q 6 3 2 2 Z" fill="#E53935" opacity="0.9"/>
    <!-- Small paint drop to round the tip -->
    <circle cx="2.5" cy="2.5" r="1.5" fill="#E53935" />
  </g>
</svg>
