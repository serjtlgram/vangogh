<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1.5" dy="1.5" stdDeviation="1.5" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="ferrule" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#888888"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="75%" stop-color="#aaaaaa"/>
      <stop offset="100%" stop-color="#555555"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d32f2f"/>
      <stop offset="40%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#3e0000"/>
    </linearGradient>
    <linearGradient id="bristles" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="40%" stop-color="#FFC107"/>
      <stop offset="80%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
  </defs>
  <g filter="url(#shadow)">
    <!-- Handle -->
    <path d="M 12 16 L 16 12 L 29 25 C 31 27, 28 30, 26 29 Z" fill="url(#handle)" />
    <!-- Ferrule -->
    <path d="M 9 13 L 13 9 L 16 12 L 12 16 Z" fill="url(#ferrule)" />
    <line x1="10" y1="14" x2="14" y2="10" stroke="#333" stroke-width="0.5"/>
    <line x1="11" y1="15" x2="15" y2="11" stroke="#333" stroke-width="0.5"/>
    <line x1="10.5" y1="14.5" x2="14.5" y2="10.5" stroke="#fff" stroke-width="0.5"/>
    <!-- Bristles -->
    <path d="M 2 2 Q 4 10 9 13 L 13 9 Q 10 4 2 2 Z" fill="url(#bristles)" />
    <!-- Bristle details -->
    <path d="M 3 3 Q 5 9 10 12 M 4 3 Q 6 8 11 11 M 3 4 Q 8 6 12 10 M 5 4 Q 8 8 12 10" stroke="#5D4037" stroke-width="0.3" fill="none"/>
    <!-- Paint tip (Blue) -->
    <path d="M 1.5 1.5 Q 3 5 5.5 6 L 6 5.5 Q 5 3 1.5 1.5 Z" fill="#1565C0" opacity="0.9"/>
    <circle cx="2" cy="2" r="1.5" fill="#1565C0" />
  </g>
</svg>
